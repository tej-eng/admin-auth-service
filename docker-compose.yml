services:
  user-auth-service:
    build: .
    container_name: user-auth-service
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:postgres@dhwaniastro-postgres:5432/astro
    ports:
      - "8006:8006"
    mem_limit: 384m
    cpus: 0.7
    networks:
      - dhwaniastro-net

networks:
  dhwaniastro-net:
    external: true