services:
  admin-auth-service:
    build: .
    container_name: admin-auth-service
    restart: always
    env_file:
      - .env
    ports:
      - "8008:8008"
    networks:
      - dhwaniastro-net

    mem_limit: 50m       
    memswap_limit: 50m    

networks:
  dhwaniastro-net:
    external: true